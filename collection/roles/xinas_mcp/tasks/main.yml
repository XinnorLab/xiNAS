---
# xinas_mcp role — the RETIREMENT SHIM (S8 T15, ADR-0010).
#
# The MCP transport now lives inside xinas-api.service (the /mcp
# Streamable HTTP endpoint + the xinas-mcp-stdio adapter binary). This
# role stops and removes the legacy standalone daemon and points the
# Claude Code integration at the new transport.
#
# Token migration (operator step): bearer tokens from the legacy
# /etc/xinas-mcp/config.json must be re-created in the xinas-api token
# store (/etc/xinas-api — see the xinas_api role README) if remote MCP
# clients used them. Local stdio access authenticates via the api
# socket's file mode (no token needed).

- name: Pre-flight — verify build artifacts are present
  ansible.builtin.stat:
    path: "{{ xinas_mcp_repo_path }}/dist/mcp-stdio.js"
  register: _mcp_build_stat
  tags: [xinas_mcp]

- name: Fail with actionable message when build artifacts are missing
  ansible.builtin.fail:
    msg: |
      xinas_mcp requires build artifacts at
      {{ xinas_mcp_repo_path }}/dist/mcp-stdio.js, which were not found.
      Run the xinas_node_build role first — either include it in the
      same playbook above xinas_mcp, or invoke it directly via
      `ansible-playbook playbooks/site.yml --tags xinas_node_build`.
  when: not _mcp_build_stat.stat.exists
  tags: [xinas_mcp]

# ─── 1. Retire the legacy daemon ───────────────────────────────────────────────

- name: Stop and disable the legacy xinas-mcp service
  ansible.builtin.systemd:
    name: xinas-mcp
    state: stopped
    enabled: false
  failed_when: false   # absent unit on fresh installs is fine
  tags: [xinas_mcp, retire]

- name: Remove the legacy xinas-mcp systemd unit
  ansible.builtin.file:
    path: /etc/systemd/system/xinas-mcp.service
    state: absent
  register: _legacy_unit_removed
  tags: [xinas_mcp, retire]

- name: Reload systemd after unit removal
  ansible.builtin.systemd:
    daemon_reload: true
  when: _legacy_unit_removed is changed
  tags: [xinas_mcp, retire]

# ─── 2. Client wrappers ────────────────────────────────────────────────────────

- name: Install the xinas-mcp-stdio transport adapter wrapper
  ansible.builtin.copy:
    dest: /usr/local/bin/xinas-mcp-stdio
    content: |
      #!/bin/sh
      # stdio → /mcp transport adapter (ADR-0010); connects to the
      # xinas-api UNIX socket (peer trust = local_admin).
      exec node {{ xinas_mcp_repo_path }}/dist/mcp-stdio.js "$@"
    owner: root
    group: root
    mode: '0755'
  tags: [xinas_mcp, wrappers]

- name: Install the xinasctl wrapper
  ansible.builtin.copy:
    dest: /usr/local/bin/xinasctl
    content: |
      #!/bin/sh
      exec node {{ xinas_mcp_repo_path }}/dist/cli/xinasctl.js "$@"
    owner: root
    group: root
    mode: '0755'
  tags: [xinas_mcp, wrappers]

- name: Remove the legacy /usr/local/bin/xinas-mcp wrapper
  ansible.builtin.file:
    path: /usr/local/bin/xinas-mcp
    state: absent
  tags: [xinas_mcp, retire]

# ─── 3. Claude Code integration → the new transport ───────────────────────────

- name: Create Claude Code config directory for root
  ansible.builtin.file:
    path: "{{ xinas_mcp_claude_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'
  when: xinas_mcp_configure_claude
  tags: [xinas_mcp, claude]

- name: Deploy Claude Code MCP servers config (first install only)
  ansible.builtin.template:
    src: claude-mcp-servers.json.j2
    dest: "{{ xinas_mcp_claude_config_dir }}/mcp_servers.json"
    owner: root
    group: root
    mode: '0600'
    force: false    # preserve user-added MCP servers
  when: xinas_mcp_configure_claude
  tags: [xinas_mcp, claude]

# ─── 4. Root SSH access for Claude Code (unchanged) ───────────────────────────

- name: Allow root SSH login via key auth (for Claude Code MCP connection)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-xinas-root-access.conf
    content: |
      # Managed by xinas_mcp Ansible role
      # Allows key-based root SSH login for Claude Code MCP stdio transport
      # Password root login remains blocked by default Ubuntu policy
      PermitRootLogin prohibit-password
    owner: root
    group: root
    mode: '0644'
  when: xinas_mcp_allow_root_ssh
  notify: Restart sshd
  tags: [xinas_mcp, ssh]
