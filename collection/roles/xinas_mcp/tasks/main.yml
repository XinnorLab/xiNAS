---
# xinas_mcp role — the LEGACY MCP daemon (retiring in S8 T15,
# ADR-0010). The Node toolchain + TypeScript build moved to
# xinas_node_build; the NFS helper moved to xinas_nfs_helper (S8 T1).
# This role now only installs/configures the legacy xinas-mcp service
# and the Claude Code integration.

- name: Pre-flight — verify build artifacts are present
  ansible.builtin.stat:
    path: "{{ xinas_mcp_repo_path }}/dist/index.js"
  register: _mcp_build_stat
  tags: [xinas_mcp]

- name: Fail with actionable message when build artifacts are missing
  ansible.builtin.fail:
    msg: |
      xinas_mcp requires build artifacts at
      {{ xinas_mcp_repo_path }}/dist/index.js, which were not found.
      Run the xinas_node_build role first — either include it in the
      same playbook above xinas_mcp, or invoke it directly via
      `ansible-playbook playbooks/site.yml --tags xinas_node_build`.
  when: not _mcp_build_stat.stat.exists
  tags: [xinas_mcp]

# ─── 4. Directories and configuration ─────────────────────────────────────────

- name: Create MCP config directory
  ansible.builtin.file:
    path: "{{ xinas_mcp_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0750'
  tags: [xinas_mcp, config]

- name: Deploy default MCP config (first install only)
  ansible.builtin.template:
    src: xinas-mcp-config.json.j2
    dest: "{{ xinas_mcp_config_dir }}/config.json"
    owner: root
    group: root
    mode: '0640'
    force: false    # never overwrite an existing config (preserves controller_id)
  tags: [xinas_mcp, config]

- name: Create audit log directory
  ansible.builtin.file:
    path: "{{ xinas_mcp_audit_log_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: '0750'
  tags: [xinas_mcp, config]

# ─── 4b. MCP server daemon (Streamable HTTP / SSE / stdio) ───────────────────
# Must run after config deploy: the daemon reads /etc/xinas-mcp/config.json
# at startup. dist/ is provisioned by xinas_node_build (preflight above).

- name: Install xinas-mcp systemd unit
  ansible.builtin.copy:
    src: "{{ xinas_mcp_repo_path }}/xinas-mcp.service"
    dest: /etc/systemd/system/xinas-mcp.service
    owner: root
    group: root
    mode: '0644'
    remote_src: true
  register: _mcp_unit
  tags: [xinas_mcp, service]

# Self-contained lifecycle (see the matching nfs-helper task above). The build
# reports changed on every run, so xinas-mcp restarts each role run to pick up
# the rebuilt dist/.
- name: Reload systemd, enable and (re)start xinas-mcp
  ansible.builtin.systemd:
    name: xinas-mcp
    daemon_reload: true
    enabled: true
    state: "{{ 'restarted' if _mcp_unit is changed else 'started' }}"
  tags: [xinas_mcp, service]

# ─── 5. Claude Code MCP integration ───────────────────────────────────────────

- name: Create Claude Code config directory for root
  ansible.builtin.file:
    path: "{{ xinas_mcp_claude_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'
  when: xinas_mcp_configure_claude
  tags: [xinas_mcp, claude]

- name: Deploy Claude Code MCP servers config (first install only)
  ansible.builtin.template:
    src: claude-mcp-servers.json.j2
    dest: "{{ xinas_mcp_claude_config_dir }}/mcp_servers.json"
    owner: root
    group: root
    mode: '0600'
    force: false    # preserve user-added MCP servers
  when: xinas_mcp_configure_claude
  tags: [xinas_mcp, claude]

# ─── 6. Root SSH access for Claude Code ───────────────────────────────────────

- name: Allow root SSH login via key auth (for Claude Code MCP connection)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-xinas-root-access.conf
    content: |
      # Managed by xinas_mcp Ansible role
      # Allows key-based root SSH login for Claude Code MCP stdio transport
      # Password root login remains blocked by default Ubuntu policy
      PermitRootLogin prohibit-password
    owner: root
    group: root
    mode: '0644'
  when: xinas_mcp_allow_root_ssh
  notify: Restart sshd
  tags: [xinas_mcp, ssh]

- name: Create xinas-mcp wrapper script
  ansible.builtin.copy:
    dest: /usr/local/bin/xinas-mcp
    content: |
      #!/bin/sh
      exec node {{ xinas_mcp_repo_path }}/dist/index.js "$@"
    owner: root
    group: root
    mode: '0755'
  tags: [xinas_mcp, ssh]
