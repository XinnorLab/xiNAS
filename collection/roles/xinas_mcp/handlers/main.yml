---
# Daemon lifecycle (xinas-nfs-helper, xinas-mcp) is driven by explicit
# ansible.builtin.systemd tasks in tasks/main.yml, NOT by handlers. This role
# provisions two independent daemons, and a global `meta: flush_handlers` would
# fire one daemon's restart before the other's unit is installed. Only the
# independent sshd restart remains a handler.

- name: Restart sshd
  ansible.builtin.service:
    name: ssh    # Ubuntu uses "ssh", not "sshd"
    state: restarted
