---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart xinas-nfs-helper
  ansible.builtin.service:
    name: xinas-nfs-helper
    state: restarted

- name: Restart xinas-mcp
  ansible.builtin.service:
    name: xinas-mcp
    state: restarted

- name: Restart sshd
  ansible.builtin.service:
    name: ssh    # Ubuntu uses "ssh", not "sshd"
    state: restarted
