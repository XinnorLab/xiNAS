---
# xinas_node_build role — Node 20 toolchain + the xiNAS-MCP TypeScript
# build (S8 T1, ADR-0010 §deployment). Extracted from xinas_mcp so the
# build artifacts (dist/) are provisioned independently of the legacy
# MCP daemon: xinas_api, xinas_agent, and the xinas_mcp shim all
# consume dist/ produced here.

# ─── 1. Node.js 20 LTS via NodeSource ─────────────────────────────────────────

- name: Check current Node.js version
  ansible.builtin.command: node --version
  register: _node_ver
  changed_when: false
  failed_when: false
  tags: [xinas_node_build, nodejs]

- name: Install Node.js 20 from NodeSource
  tags: [xinas_node_build, nodejs]
  when: >
    _node_ver.rc != 0 or
    not (_node_ver.stdout | regex_search('^v2[0-9]\.'))
  block:
    - name: Install NodeSource prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Create /etc/apt/keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    # curl pipes into `gpg --dearmor`; get_url cannot dearmor, and the
    # task is already guarded by creates:.
    - name: Import NodeSource GPG key  # noqa: command-instead-of-module
      ansible.builtin.shell: >
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
      args:
        creates: /etc/apt/keyrings/nodesource.gpg

    - name: Add NodeSource APT repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/nodesource.gpg]
          https://deb.nodesource.com/node_20.x nodistro main
        state: present
        filename: nodesource

    # NodeSource's nodejs bundles headers that collide with Ubuntu's node-12
    # packages (both ship /usr/include/node/common.gypi), so the node-20 unpack
    # aborts with "trying to overwrite '/usr/include/node/common.gypi', which is
    # also in package libnode-dev". Remove the distro node-12 dev/doc/lib
    # packages first.
    - name: Remove distro node-12 packages that conflict with NodeSource node 20
      ansible.builtin.apt:
        name:
          - libnode-dev
          - libnode72
          - nodejs-doc
        state: absent
        purge: true
        autoremove: true

    # state: latest, NOT present — Ubuntu 22.04 ships nodejs 12.22.9, which
    # already satisfies `present`, so apt would keep node 12 and npm ci/build
    # then fail (optional chaining needs node >= 14). latest forces the upgrade
    # to the NodeSource 20.x candidate.
    - name: Install nodejs 20 (upgrade over any distro node)
      ansible.builtin.apt:
        name: nodejs
        state: latest
        update_cache: true

# Guard: confirm the upgrade took effect before building, so a stale node 12
# surfaces as a clear message instead of a cryptic npm SyntaxError (optional
# chaining) mid-`npm ci`.
- name: Re-check Node.js version
  ansible.builtin.command: node --version
  register: _node_ver_final
  changed_when: false
  tags: [xinas_node_build, nodejs]

- name: Assert Node.js >= 20 before building
  ansible.builtin.assert:
    that:
      - _node_ver_final.stdout is regex('^v(2[0-9]|[3-9][0-9])\.')
    fail_msg: >-
      Node.js is {{ _node_ver_final.stdout }} but the build needs >= 20. The
      NodeSource upgrade did not take effect (distro node 12 still active) — check
      the NodeSource repo/key and that libnode-dev/libnode72 were removed.
    success_msg: "Node.js {{ _node_ver_final.stdout }} OK"
  tags: [xinas_node_build, nodejs]

# ─── 2. Build xiNAS-MCP → dist/ ────────────────────────────────────────────────

- name: Verify xiNAS-MCP source directory exists
  ansible.builtin.stat:
    path: "{{ xinas_node_build_repo_path }}/package.json"
  register: _src
  tags: [xinas_node_build, build]

- name: Fail if xiNAS-MCP source not found
  ansible.builtin.fail:
    msg: >
      xiNAS-MCP source not found at {{ xinas_node_build_repo_path }}.
      Ensure the xiNAS repo is cloned to /opt/xiNAS before running this role.
  when: not _src.stat.exists
  tags: [xinas_node_build, build]

- name: Install npm dependencies
  ansible.builtin.command:
    cmd: npm ci
    chdir: "{{ xinas_node_build_repo_path }}"
  register: _npm_ci
  changed_when: "'added' in _npm_ci.stdout or 'updated' in _npm_ci.stdout"
  tags: [xinas_node_build, build]

- name: Build TypeScript → dist/
  ansible.builtin.command:
    cmd: npm run build
    chdir: "{{ xinas_node_build_repo_path }}"
  changed_when: true
  tags: [xinas_node_build, build]
