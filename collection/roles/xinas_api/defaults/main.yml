---
# xinas_api role defaults — Phase 0 installer.
# Spec: docs/Installer/xinas-api-role-spec.md

# Source tree where the Node app is built (must match xinas_mcp_repo_path).
xinas_api_repo_path: /opt/xiNAS/xiNAS-MCP

# On-disk config + secret directory.
xinas_api_config_dir: /etc/xinas-api

# Canonical Phase 0 state + audit paths (per ADR-0003 §State store and
# §Audit semantics). xinas-api is the sole writer of both per ADR-0002
# — the future xinas-agent reports observations via the API's
# /internal/v1/observed endpoint, not by writing these files directly.
# The directories are pre-created by tmpfiles.d as
# {{ xinas_api_user }}:{{ xinas_api_socket_group }} 0750; the static
# system user owns the files so they persist across restarts.
#
# Phase 0 caveat: the systemd unit hardcodes
# `ReadWritePaths=/var/lib/xinas/state /var/log/xinas`. Overriding
# these variables alone is NOT enough — you must also patch the unit
# (or ship a drop-in at /etc/systemd/system/xinas-api.service.d/) so
# ReadWritePaths covers your replacement paths, otherwise the api
# hits EROFS under ProtectSystem=strict. Variables exist for naming
# consistency across tasks + tmpfiles + config.json; full override
# support lands when the unit is templated.
xinas_api_state_dir: /var/lib/xinas/state
xinas_api_log_dir:   /var/log/xinas

# Unix-domain socket path. The parent directory /run/xinas is created
# by the role's tmpfiles.d entry as root:xinas-admin 0770 so the api
# process (primary group xinas-admin via the unit's `Group=`) can
# create the socket and operators in xinas-admin can traverse + connect;
# the socket file itself is chmod 0660 + chown :{{ xinas_api_socket_group }}
# by server.ts after binding.
#
# Phase 0 caveat: the tmpfiles.d entry hardcodes /run/xinas as the
# parent dir name, and operators expect the socket under /run/xinas/.
# Overriding `xinas_api_socket` to e.g. /var/run/xinas-api/api.sock
# WITHOUT also patching the tmpfiles template will leave the api
# trying to bind a path whose parent doesn't exist. Variable exists
# for naming consistency in the config template; full override support
# lands when tmpfiles is templated through this variable.
xinas_api_socket: /run/xinas/api.sock

# Static system user the api process runs as (the unit's `User=` line).
# Owns SQLite + audit JSONL so files persist with a stable owner
# across restarts. Created with `--system --no-create-home --shell
# /usr/sbin/nologin`.
#
# Phase 0 caveat: the systemd unit shipped in xiNAS-MCP/xinas-api.service
# hardcodes `User=xinas-api`. Overriding this variable alone is NOT
# enough — you must also patch the unit (or ship your own drop-in at
# /etc/systemd/system/xinas-api.service.d/) so the unit's User= matches.
# The variable exists for naming consistency across the role's tasks +
# tmpfiles.d snippet; full override support lands when the unit is
# templated.
xinas_api_user: xinas-api

# Group that owns the UDS file + state/log dirs (gid resolved at
# template time via getent). Also the primary group of the api process
# at runtime (set by the unit's `Group=xinas-admin`). Members of this
# group can connect to the socket and read state/log files; only the
# {{ xinas_api_user }} user can write them.
#
# Phase 0 caveat: the unit hardcodes `Group=xinas-admin`. Overriding
# this variable alone is NOT enough — see the same drop-in pattern noted
# under `xinas_api_user`. The variable exists for naming consistency
# across the role's tasks; full override support lands when the unit
# is templated.
xinas_api_socket_group: xinas-admin

# Controller identity. Per phase0-requirements §3 + xinas-agent S0+S1
# spec, controller_id lives in /var/lib/xinas/controller-id as a
# persistent file generated by uuidgen on first install (A5). The file
# co-locates with state under /var/lib/xinas/ so OS reinstall
# preserving the data disk preserves both identity and audit chain.
#
# This default is a placeholder ONLY. A5 reads the file ON THE REMOTE
# HOST (ansible.builtin.slurp) and overrides this via set_fact before
# the config.json template task runs. Do NOT use `lookup('file', ...)`
# here: Ansible lookups execute on the CONTROL NODE, not the managed
# host, so a lookup would read the controller's filesystem (wrong id,
# or a hard error when the path is absent on the controller).
# Override this variable explicitly only if you have a pre-assigned
# controller_id from a control-plane registry (it then wins over A5's
# set_fact because extra-vars/play-vars outrank role defaults).
xinas_api_controller_id: ""

# Agent UDS socket the api's HeartbeatTracker connects to (config.agent.socket).
# Wires the api↔agent heartbeat: MUST match the xinas_agent role's
# xinas_agent_socket so the tracker can reach the agent.
xinas_api_agent_socket: /run/xinas/agent.sock

# Interval (ms) at which the api's HeartbeatTracker pings the agent
# (config.agent.heartbeat_interval_ms). MUST match the xinas_agent role's
# xinas_agent_heartbeat_interval_ms so both ends agree on the cadence.
xinas_api_agent_heartbeat_interval_ms: 5000
