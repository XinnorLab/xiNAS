---
# =============================================================
# Role: net_controllers
# Purpose: Configure high-speed network interfaces with automatic IP allocation
# =============================================================

# Step 1: Detect high-speed network interfaces
- name: Detect high-speed network interfaces (InfiniBand + mlx5)
  ansible.builtin.shell: |
    set -o pipefail
    found=""

    # Method 1: Check /sys/class/net/ (normal case)
    for iface in /sys/class/net/*; do
      [ -d "$iface" ] || continue
      name=$(basename "$iface")
      [ "$name" = "lo" ] && continue
      [ -e "$iface/device" ] || continue

      type=$(cat "$iface/type" 2>/dev/null || echo "0")
      driver=$(basename "$(readlink -f "$iface/device/driver" 2>/dev/null)" 2>/dev/null || echo "")

      # InfiniBand interfaces (type 32) or mlx5_core driver
      if [ "$type" = "32" ] || [ "$driver" = "mlx5_core" ]; then
        echo "$name"
        found="yes"
      fi
    done

    # Method 2: Fallback to /proc/net/dev for IB interfaces
    # (needed after DOCA-OFED install before reboot)
    if [ -z "$found" ]; then
      awk -F: '/^[[:space:]]*(ib[^:]+):/ {gsub(/^[[:space:]]+/, "", $1); print $1}' /proc/net/dev 2>/dev/null
    fi
  args:
    executable: /bin/bash
  register: detected_interfaces
  changed_when: false
  when: net_ip_pool_enabled | bool
  tags: [network]

- name: Display detected interfaces
  ansible.builtin.debug:
    msg: "Detected high-speed interfaces: {{ detected_interfaces.stdout_lines | default([]) | join(', ') }}"
  when: net_ip_pool_enabled | bool
  tags: [network]

# Step 1b: Build per-interface MTU map (auto-detect when net_mtu is 0)
- name: Build per-interface MTU map (auto-detect IB vs RoCE)
  ansible.builtin.shell: |
    set -o pipefail
    for iface in {{ detected_interfaces.stdout_lines | default([]) | join(' ') }}; do
      type=$(cat "/sys/class/net/$iface/type" 2>/dev/null || echo "0")
      if [ "$type" = "32" ]; then
        echo "$iface:4092"
      else
        echo "$iface:9000"
      fi
    done
  args:
    executable: /bin/bash
  register: mtu_detection
  changed_when: false
  when: net_ip_pool_enabled | bool and (net_mtu | default(0) | int == 0)
  tags: [network]

- name: Set per-interface MTU facts
  ansible.builtin.set_fact:
    net_iface_mtus: >-
      {%- set result = {} -%}
      {%- for line in mtu_detection.stdout_lines | default([]) -%}
      {%- set parts = line.split(':') -%}
      {%- set _ = result.update({parts[0]: parts[1] | int}) -%}
      {%- endfor -%}
      {{ result }}
  when: net_ip_pool_enabled | bool and (net_mtu | default(0) | int == 0)
  tags: [network]

# Step 2: Build IP allocation map from pool
- name: Build IP allocation map from pool
  ansible.builtin.set_fact:
    net_allocated_ips: >-
      {%- set result = {} -%}
      {%- set pool_parts = net_ip_pool_start.split('.') -%}
      {%- set base = pool_parts[0] ~ '.' ~ pool_parts[1] ~ '.' -%}
      {%- set start_octet = pool_parts[2] | int -%}
      {%- set host_octet = pool_parts[3] -%}
      {%- for iface in detected_interfaces.stdout_lines | default([]) -%}
      {%- if iface in net_manual_ips -%}
      {%- set _ = result.update({iface: net_manual_ips[iface]}) -%}
      {%- else -%}
      {%- set _ = result.update({iface: base ~ (start_octet + loop.index0) ~ '.' ~ host_octet ~ '/' ~ net_ip_pool_prefix | string}) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ result }}
  when: net_ip_pool_enabled | bool
  tags: [network]

- name: Display IP allocation
  ansible.builtin.debug:
    msg: |
      IP Allocation:
      {% for iface, ip in net_allocated_ips.items() %}
        {{ iface }}: {{ ip }}
      {% endfor %}
  when: net_ip_pool_enabled | bool and (net_allocated_ips | length > 0)
  tags: [network]

# Step 2b: Validate allocated IPs have valid octets (prevent third-octet overflow)
- name: Validate allocated IPs are valid IPv4 addresses
  ansible.builtin.fail:
    msg: >-
      IP pool overflow: interface {{ item.key }} was assigned {{ item.value }}
      which contains an invalid octet (> 255). The pool starting at
      {{ net_ip_pool_start }} cannot accommodate {{ net_allocated_ips | length }}
      interfaces. Either use a lower starting third-octet, reduce the number
      of interfaces, or use net_manual_ips overrides.
  loop: "{{ net_allocated_ips | dict2items }}"
  when:
    - net_ip_pool_enabled | bool
    - net_allocated_ips | length > 0
    - (item.value.split('/')[0].split('.')[2] | int) > 255
  tags: [network]

# Step 3: Flush stale PBR rules and secondary IPs before deploying netplan
- name: Flush stale policy-based routing rules and secondary IPs
  ansible.builtin.shell: |
    # Flush PBR rules and routing tables (100-199)
    for table in $(ip rule show | grep -oP 'lookup \K(1[0-9]{2})'); do
      ip rule show | grep "lookup $table" | while IFS=: read -r _ spec; do
        ip rule del $spec 2>/dev/null || true
      done
      ip route flush table "$table" 2>/dev/null || true
    done
    # Flush all IPs from RDMA-capable (mlx) interfaces so netplan apply
    # starts from a clean state — prevents stale secondary addresses
    for iface in /sys/class/net/*/device/driver; do
      driver=$(readlink -f "$iface" 2>/dev/null | xargs basename 2>/dev/null)
      if echo "$driver" | grep -q "mlx"; then
        ifname=$(echo "$iface" | cut -d/ -f5)
        ip addr flush dev "$ifname" 2>/dev/null || true
      fi
    done
  become: true
  changed_when: false
  tags: [network]

# Step 4: Deploy netplan configuration
- name: Deploy netplan configuration for network controllers
  ansible.builtin.template:
    src: netplan.yaml.j2
    dest: /etc/netplan/99-xinas.yaml
    owner: root
    group: root
    mode: '0600'
  become: true
  notify: apply netplan
  when: net_ip_pool_enabled | bool and (net_allocated_ips | default({}) | length > 0)
  tags: [network]

# Fallback: Manual mode (pool disabled)
- name: Deploy static netplan configuration (manual mode)
  ansible.builtin.template:
    src: netplan.yaml.j2
    dest: /etc/netplan/99-xinas.yaml
    owner: root
    group: root
    mode: '0600'
  become: true
  notify: apply netplan
  when: not net_ip_pool_enabled | bool
  tags: [network]

# Step 5: Always apply netplan after PBR flush to ensure clean state
- name: Apply netplan to sync kernel state after PBR flush
  ansible.builtin.command: netplan apply
  become: true
  changed_when: false
  tags: [network]
