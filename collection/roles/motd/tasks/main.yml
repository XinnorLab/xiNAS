---
# Deploy xiNAS dynamic MOTD

- name: Disable default Ubuntu MOTD scripts
  ansible.builtin.file:
    path: "/etc/update-motd.d/{{ item }}"
    mode: '0644'
  loop:
    - 10-help-text
    - 50-motd-news
    - 80-esm
    - 80-livepatch
    - 91-release-upgrade
    - 95-hwe-eol
  failed_when: false
  when: motd_disable_default | bool
  tags: [motd]

- name: Deploy xiNAS MOTD script
  ansible.builtin.template:
    src: 99-xinas-status.j2
    dest: /etc/update-motd.d/99-xinas-status
    mode: '0755'
    owner: root
    group: root
  when: motd_enabled | bool
  tags: [motd]

- name: Ensure MOTD is regenerated on login
  ansible.builtin.lineinfile:
    path: /etc/pam.d/login
    line: "session    optional   pam_motd.so motd=/run/motd.dynamic"
    regexp: "pam_motd.*motd=/run/motd.dynamic"
    state: present
  failed_when: false
  tags: [motd]

- name: Ensure SSH shows MOTD
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PrintMotd"
    line: "PrintMotd no"
    state: present
  notify: Reload sshd
  failed_when: false
  tags: [motd]

- name: Ensure SSH uses PAM (for dynamic MOTD)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?UsePAM"
    line: "UsePAM yes"
    state: present
  notify: Reload sshd
  failed_when: false
  tags: [motd]

# Also create a standalone script for manual viewing
- name: Create xinas-status command
  ansible.builtin.copy:
    src: /etc/update-motd.d/99-xinas-status
    dest: /usr/local/bin/xinas-status
    mode: '0755'
    remote_src: true
  when: motd_enabled | bool
  tags: [motd]

# Pre-login banner (SSH Banner directive)
- name: Deploy banner generator script
  ansible.builtin.template:
    src: generate-banner.j2
    dest: /usr/local/bin/xinas-generate-banner
    mode: '0755'
    owner: root
    group: root
  when: banner_enabled | bool
  tags: [motd, banner]

- name: Generate initial banner
  ansible.builtin.command: /usr/local/bin/xinas-generate-banner
  changed_when: true
  when: banner_enabled | bool
  tags: [motd, banner]

- name: Set up cron job to refresh banner
  ansible.builtin.cron:
    name: "Refresh xiNAS login banner"
    minute: "*/{{ banner_refresh_minutes }}"
    job: "/usr/local/bin/xinas-generate-banner"
    user: root
    state: present
  when: banner_enabled | bool
  tags: [motd, banner]

- name: Enable SSH banner
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?Banner"
    line: "Banner /etc/issue.net"
    state: present
  notify: Reload sshd
  when: banner_enabled | bool
  tags: [motd, banner]

- name: Disable SSH banner when not enabled
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^Banner"
    state: absent
  notify: Reload sshd
  when: not (banner_enabled | bool)
  tags: [motd, banner]


- name: Deploy login menu hint script
  ansible.builtin.template:
    src: xinas-menu-hint.sh.j2
    dest: /etc/profile.d/99-xinas-menu.sh
    mode: '0755'
    owner: root
    group: root
  when: menu_hint_enabled | bool
  tags: [motd, menu]

- name: Remove login menu hint when disabled
  ansible.builtin.file:
    path: /etc/profile.d/99-xinas-menu.sh
    state: absent
  when: not (menu_hint_enabled | bool)
  tags: [motd, menu]

# ===== Installed-preset marker (finding #16) =====
# motd is the last role, so writing this marker here means it only appears on a
# fully successful install. Downstream tooling/tests read it to learn the preset
# without guessing. Preset comes from the autoinstall -e var, falling back to the
# .xinas_applied_preset file the menu's apply_preset writes (control == target on
# a xiNAS node, so a control-side file lookup resolves the host's file).
- name: Resolve installed preset name
  ansible.builtin.set_fact:
    xinas_installed_preset: >-
      {{ (xinas_install_preset | default('', true) | trim)
         or (lookup('file', '/opt/xiNAS/.xinas_applied_preset', errors='ignore')
             | default('', true) | trim) }}
  tags: [motd, install_state]

- name: Stamp /opt/xiNAS/.installed_preset on successful install
  ansible.builtin.copy:
    dest: /opt/xiNAS/.installed_preset
    content: "{{ xinas_installed_preset }}\n"
    owner: root
    group: root
    mode: '0644'
  when: xinas_installed_preset | length > 0
  tags: [motd, install_state]
