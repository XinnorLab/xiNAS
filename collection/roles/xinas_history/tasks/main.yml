---
# Deploy xiNAS Configuration History package
- name: Create config-history store directory
  ansible.builtin.file:
    path: /var/lib/xinas/config-history
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Purge existing config history on install
  ansible.builtin.file:
    path: "/var/lib/xinas/config-history/{{ item }}"
    state: absent
  loop:
    - snapshots
    - baseline
    - state

- name: Create config-history subdirectories
  ansible.builtin.file:
    path: "/var/lib/xinas/config-history/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0700'
  loop:
    - snapshots
    - state

- name: Copy xinas_history package
  ansible.builtin.copy:
    src: "{{ xinas_history_src | default(playbook_dir + '/../xinas_history') }}"
    dest: /opt/xiNAS/xinas_history
    owner: root
    group: root
    mode: '0644'
    directory_mode: '0755'

- name: Ensure python3-venv is installed
  ansible.builtin.apt:
    name: python3-venv
    state: present

- name: Create shared venv if absent
  ansible.builtin.command:
    cmd: python3 -m venv /opt/xiNAS/venv
    creates: /opt/xiNAS/venv/bin/python

- name: Install xinas_history into shared venv
  ansible.builtin.pip:
    name:
      - pyyaml
    virtualenv: /opt/xiNAS/venv
    virtualenv_command: python3 -m venv
    state: present

- name: Create xinas-history CLI wrapper
  ansible.builtin.copy:
    dest: /usr/local/bin/xinas-history
    content: |
      #!/bin/bash
      exec /opt/xiNAS/venv/bin/python3 -m xinas_history "$@"
    owner: root
    group: root
    mode: '0755'

- name: Create baseline snapshot
  ansible.builtin.command:
    cmd: >-
      /usr/local/bin/xinas-history
      snapshot create
      --source installer
      --operation install
      --type baseline
      --preset "{{ preset | default('') }}"
  register: baseline_result
  changed_when: baseline_result.rc == 0
  failed_when: false
