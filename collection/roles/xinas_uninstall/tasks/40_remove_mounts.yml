---
# Phase D — stop, disable, and delete every xiNAS-generated systemd .mount
# unit. Mounts are identified by their Description= line (set in
# collection/roles/raid_fs/templates/mount.unit.j2). After mounts are gone,
# the kernel NFS server is stopped + disabled too.

- name: "Mounts | find xiNAS-generated mount units"
  ansible.builtin.shell: |
    set -e
    out=""
    for unit_path in /etc/systemd/system/*.mount; do
      [ -e "$unit_path" ] || continue
      desc=$(awk -F'=' '/^Description=/{print substr($0, index($0,"=")+1); exit}' "$unit_path")
      case "$desc" in
        "{{ xinas_mount_unit_signature }}"*)
          out="$out\n$(basename "$unit_path")"
          ;;
      esac
    done
    printf '%b' "$out" | sed '/^$/d'
  args:
    executable: /bin/bash
  register: _xinas_mounts
  changed_when: false

- name: "Mounts | parse mount unit list"
  ansible.builtin.set_fact:
    _xinas_mount_units: "{{ (_xinas_mounts.stdout_lines | default([])) | reject('equalto','') | list }}"

- name: "Mounts | stop xiNAS mount units"
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ _xinas_mount_units }}"
  register: _mount_stop
  failed_when: false
  changed_when: _mount_stop.changed | default(false)

- name: "Mounts | delete unit files"
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item }}"
    state: absent
  loop: "{{ _xinas_mount_units }}"

- name: "Mounts | stop and disable nfs-server"
  ansible.builtin.systemd:
    name: nfs-server.service
    state: stopped
    enabled: false
  register: _nfs_stop
  failed_when: false
  changed_when: _nfs_stop.changed | default(false)

- name: "Mounts | daemon-reload"
  ansible.builtin.systemd:
    daemon_reload: true

- name: "Mounts | record removal"
  ansible.builtin.set_fact:
    uninstall_summary: >-
      {{
        uninstall_summary | combine({
          'removed': uninstall_summary.removed + [
            ['Mount units', (_xinas_mount_units | join(', ')) if _xinas_mount_units | length else 'none found'],
            ['Services (stopped)', 'nfs-server']
          ]
        })
      }}
