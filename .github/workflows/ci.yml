# Phase 0 CI bootstrap.
#
# See docs/control-path/ci-bootstrap-design.md for the full design,
# gate matrix, and backfill plan.
#
# Flip-to-blocking TODOs (in spec order):
#   TODO: expand typescript-lint to style/suspicious rule categories
#         (measured 2026-06-11, biome 1.9.4, style+suspicious "all" on src/:
#         ~3.7k diagnostics (233 errors + ~3.5k warnings) — needs its own
#         debt package, likely "recommended" first)
#   TODO: graduate pyright standard -> strict per module
#   TODO: graduate ansible-lint basic -> production
#   TODO: ratchet the pytest --cov floor upward as xinas_history coverage grows
#   TODO: add MCP integration smoke test (after containerized harness exists)
#   TODO: add live contract test against the WS1 mock server (after mock ships)

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xiNAS-MCP/package-lock.json
      - run: npm ci
        working-directory: xiNAS-MCP
      - run: npm run typecheck
        working-directory: xiNAS-MCP

  typescript-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xiNAS-MCP/package-lock.json
      - run: npm ci
        working-directory: xiNAS-MCP
      - run: npm run lint
        working-directory: xiNAS-MCP

  typescript-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xiNAS-MCP/package-lock.json
      - run: npm ci
        working-directory: xiNAS-MCP
      - run: npm run format:check
        working-directory: xiNAS-MCP

  typescript-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xiNAS-MCP/package-lock.json
      - run: npm ci
        working-directory: xiNAS-MCP
      - run: npm test
        working-directory: xiNAS-MCP

  typescript-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xiNAS-MCP/package-lock.json
      - run: npm ci
        working-directory: xiNAS-MCP
      - run: npm run test:contracts
        working-directory: xiNAS-MCP

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev]'
      # Coverage floor measured at 22% on 2026-06-11; floor set just below.
      # Ratchet upward when meaningful xinas_history coverage lands.
      - run: pytest --cov=xinas_history --cov-fail-under=20

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev]'
      - run: ruff check xinas_menu xinas_history xiNAS-MCP/nfs-helper

  python-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev]'
      - run: ruff format --check xinas_menu xinas_history xiNAS-MCP/nfs-helper

  python-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev]'
      - run: pyright xinas_menu xinas_history xiNAS-MCP/nfs-helper

  ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ansible-lint
      - run: ansible-lint collection/roles/

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install yamllint
      - run: yamllint -c .yamllint.yml .

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          npx --yes -p @stoplight/spectral-cli@latest spectral lint \
            --ruleset .spectral.yaml \
            docs/control-path/api-v1.yaml

  # Breaking-change gate between the PR's api-v1.yaml and the base branch's.
  # PR-only: on push to main there is no base to diff against.
  # The action runs in a Docker container that cannot see the runner's /tmp,
  # so the base spec is passed as a git ref (the action's documented pattern).
  openapi-compat:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git fetch --depth=1 origin "$GITHUB_BASE_REF"
      - uses: oasdiff/oasdiff-action/breaking@v0.0.57
        with:
          base: 'origin/${{ github.base_ref }}:docs/control-path/api-v1.yaml'
          revision: docs/control-path/api-v1.yaml
          fail-on: ERR

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks scans history
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # required for PR scans
          GITLEAKS_CONFIG: .gitleaks.toml

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx --yes markdownlint-cli2 'docs/**/*.md'
