  # =========================================================================
  # Health
  # =========================================================================
  # ── S8 T5 (ADR-0010 §read-route promotion): the read-only tools the
  # legacy MCP served from in-process adapters, as real API routes.
  # Each degrades to an empty result + a DEGRADED_BACKEND_UNAVAILABLE
  # warning instead of failing.
  /disks/{id}:
    get:
      tags: [storage]
      operationId: getDisk
      summary: Get one disk (status.health covers the legacy SMART read where reported).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /system/logs:
    get:
      tags: [system]
      operationId: getSystemLogs
      summary: Tail the systemd journal (secret-scrubbed).
      description: Degrades with a warning when the journal is unreadable (service user not in systemd-journal).
      parameters:
        - { name: unit, in: query, required: false, schema: { type: string } }
        - { name: lines, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 2000, default: 200 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '500': { $ref: '#/components/responses/Internal' }

