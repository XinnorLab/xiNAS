      requestBody: { $ref: '#/components/requestBodies/Mutating' }
      responses:
        '200': { $ref: '#/components/responses/PlanReturned' }
        '202': { $ref: '#/components/responses/TaskAccepted' }
        '400': { $ref: '#/components/responses/InvalidArgument' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }
        '500': { $ref: '#/components/responses/Internal' }

  /filesystems/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [storage]
      operationId: getFilesystem
      summary: Get a single filesystem.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/Filesystem' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }
    patch:
      tags: [storage]
      operationId: updateFilesystem
      summary: Mount, unmount, grow, or change quota mode (plan/apply).
      description: |
        ONE intent key per PATCH spec — exactly one of `mounted` (boolean →
        fs.mount/fs.unmount), `grow: true` (→ fs.grow), or `quota_mode`
        (→ fs.set_quota_mode, a client-visible remount). Multiple intent
        keys → `INVALID_ARGUMENT`. Identity fields (`mountpoint`,
        `backing_device`, `log_device`, `label`, `su_kb`, `sw`,
        `sector_size`, `log_size`, `fs_type`) → per-field `UNSUPPORTED`
        with `reason: fs_identity_immutable` (re-create to change,
        ADR-0007 writability matrix).
      requestBody: { $ref: '#/components/requestBodies/Mutating' }
      responses:
        '200': { $ref: '#/components/responses/PlanReturned' }
        '202': { $ref: '#/components/responses/TaskAccepted' }
        '400': { $ref: '#/components/responses/InvalidArgument' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }
        '500': { $ref: '#/components/responses/Internal' }
    delete:
      tags: [storage]
      operationId: deleteFilesystem
      summary: Remove filesystem from management (data preserved by default; plan/apply).
      requestBody: { $ref: '#/components/requestBodies/Mutating' }
      responses:
        '200': { $ref: '#/components/responses/PlanReturned' }
        '202': { $ref: '#/components/responses/TaskAccepted' }
        '400': { $ref: '#/components/responses/InvalidArgument' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }
        '500': { $ref: '#/components/responses/Internal' }

