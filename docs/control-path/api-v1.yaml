        '500': { $ref: '#/components/responses/Internal' }

  # MCP transport gate (ADR-0010): tool calls arriving via the MCP
  # transport replay through these same routes with client_type=mcp.
  # Reads and mode=plan always pass; mode=apply requires
  # mcp.allow_apply=true in the api config (default false — the WS12
  # exit criterion). Exemptions with rationale: POST /support-bundle
  # (read-style diagnostic) and POST /tasks/{id}/cancel (emergency
  # stop cannot apply new state). REST callers are never gated here.
  /health:
    get:
      tags: [health]
      operationId: runHealthCheck
      summary: Run a health profile and return the report.
      description: |
        Profiles nest (standard ⊇ quick, deep ⊇ standard; ADR-0009).
        quick is KV-derived and always answers; standard/deep add
        agent-probe-backed checks which degrade with EXECUTOR_UNAVAILABLE
        evidence when the agent is unreachable.
      parameters:
        - in: query
          name: profile
          schema: { type: string, enum: [quick, standard, deep], default: quick }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/HealthReport' }
        '500': { $ref: '#/components/responses/Internal' }

  # =========================================================================
  # Tasks
  # =========================================================================
  /tasks:
    get:
      tags: [tasks]
      operationId: listTasks
      summary: List tasks (most recent first).
      parameters:
        - in: query
          name: state
          schema: { type: string }
        - in: query
          name: kind
          schema: { type: string }
        - $ref: '#/components/parameters/QueryLimit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      result:
                        type: array
                        items: { $ref: '#/components/schemas/Task' }
        '500': { $ref: '#/components/responses/Internal' }

  /tasks/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [tasks]
      operationId: getTask
      summary: Get a single task with stage details.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/Task' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /tasks/{id}/cancel:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [tasks]
      operationId: cancelTask
      summary: Request task cancellation (honored at safe checkpoints).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/Internal' }

  /tasks/{id}/watch:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [tasks]
      operationId: watchTask
      summary: Stream task progress as Server-Sent Events.
      responses:
        '200':
          description: SSE stream.
          content:
            text/event-stream:
              schema: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  # =========================================================================
  # Internal (agent → api) — not part of the public client surface
  # =========================================================================
  /internal/v1/task_progress:
    post:
      tags: [tasks]
      operationId: pushTaskProgress
      summary: Agent→api task progress push (internal; mirrors /internal/v1/observed).
      description: |
        Internal route, **not** for client use. The xinas-agent pushes task
        progress facts here as a typed event; the api is the sole writer of
        the durable `task_stages` / `tasks` rows (per ADR-0002 and
        s2-task-envelope-spec §6). This route **replaces** the removed
        `task.stage_report` api→agent RPC.

        Auth mirrors `/internal/v1/observed`: gated by `requireInternalAgent`
        and accepts only the internal-agent bearer token (the agent principal).
        Unix-peer-cred promotion does not apply to internal routes.

        Idempotent: `sequence` is per-task monotonic; an event with
        `sequence ≤` the task's high-water mark is a 200 no-op.
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TaskProgressEvent' }
      responses:
        '200':
          description: Event applied (or accepted as an idempotent no-op).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '400': { $ref: '#/components/responses/InvalidArgument' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  # =========================================================================
  # Events / audit
  # =========================================================================
  /events:
    get:
      tags: [events]
      operationId: listEvents
      summary: List events (most recent first).
      parameters:
        - in: query
          name: since
          schema: { type: string, format: date-time }
        - in: query
          name: severity
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      result:
                        type: array
                        items: { $ref: '#/components/schemas/Event' }
        '500': { $ref: '#/components/responses/Internal' }

  /audit:
    get:
      tags: [audit]
      operationId: queryAudit
      summary: Query audit entries (read-only).
      description: |
        S9 (ADR-0011): tail filters (kind/principal/client_type/since/
        until/limit, newest-first, limit default 100 cap 1000) over the
        audit log, or ONE exact lookup (request_id|operation_id|task_id)
        resolved via the audit index with an outbox fallback for rows
        not yet drained.
      parameters:
        - in: query
          name: request_id
          schema: { type: string }
        - in: query
          name: operation_id
          schema: { type: string }
        - in: query
          name: task_id
          schema: { type: string }
        - in: query
          name: kind
          schema: { type: string }
        - in: query
          name: principal
          schema: { type: string }
        - in: query
          name: client_type
          schema: { type: string }
        - in: query
          name: since
          schema: { type: string, format: date-time }
        - in: query
          name: until
          schema: { type: string, format: date-time }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
      responses:
        '200':
          description: OK (result is AuditEntry[], newest first)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '500': { $ref: '#/components/responses/Internal' }

  # =========================================================================
  # Config history / drift / rollback
  # =========================================================================
  /config-history/snapshots:
    get:
      tags: [config-history]
      operationId: listConfigSnapshots
      summary: List configuration snapshots.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      result:
                        type: array
                        items: { $ref: '#/components/schemas/ConfigSnapshot' }
        '500': { $ref: '#/components/responses/Internal' }

  /config-history/snapshots/{id}:
    parameters:
      - $ref: '#/components/parameters/PathId'
    get:
      tags: [config-history]
      operationId: getConfigSnapshot
      summary: Get a single configuration snapshot.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/ConfigSnapshot' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /config-history/diff:
    get:
      tags: [config-history]
      operationId: diffConfigSnapshots
      summary: Diff between two snapshots.
      parameters:
        - in: query
          name: from
          required: true
          schema: { type: string }
        - in: query
          name: to
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '400': { $ref: '#/components/responses/InvalidArgument' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /config-history/rollback:
    post:
      tags: [config-history]
      operationId: planConfigRollback
      summary: Plan a rollback to a snapshot (plan/apply).
      requestBody: { $ref: '#/components/requestBodies/Mutating' }
      responses:
        '200': { $ref: '#/components/responses/PlanReturned' }
        '202': { $ref: '#/components/responses/TaskAccepted' }
        '400': { $ref: '#/components/responses/InvalidArgument' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }
        '422': { $ref: '#/components/responses/Unsupported' }
        '500': { $ref: '#/components/responses/Internal' }

  /config-history/drift:
    get:
      tags: [config-history]
      operationId: getDriftReport
      summary: Get current drift report.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Envelope' }
        '500': { $ref: '#/components/responses/Internal' }

  # =========================================================================
  # Support bundle
  # =========================================================================
  /support-bundle:
    post:
      tags: [support]
      operationId: createSupportBundle
      summary: Generate a support bundle (returns a task).
      responses:
        '202': { $ref: '#/components/responses/TaskAccepted' }
        '500': { $ref: '#/components/responses/Internal' }

  /support-bundle/{task_id}:
    parameters:
      - $ref: '#/components/parameters/PathTaskId'
    get:
      tags: [support]
      operationId: downloadSupportBundle
      summary: Download a finished support bundle.
      responses:
        '200':
          description: gzip stream.
          content:
            application/gzip:
              schema: { type: string, format: binary }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  # =========================================================================
  # Users / Groups (observed state from E8 collector)
  # =========================================================================
  /users:
    get:
      tags: [users]
      operationId: listUsers
      summary: List all observed local and NSS-resolved users.
      description: >
        Returns all User objects observed by the E8 users collector.
        Filter by source to narrow to local (/etc/passwd) or NSS-resolved entries.
      parameters:
        - name: source
          in: query
          schema:
            type: string
            enum: [local, nss, all]
            default: all
        - $ref: '#/components/parameters/QueryLimit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      result:
                        type: array
                        items: { $ref: '#/components/schemas/User' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{uid}:
    get:
      tags: [users]
      operationId: getUser
      summary: Get a single user by numeric uid.
      description: Returns the User object for the given numeric uid, or 404 if not found.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/User' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /groups:
    get:
      tags: [groups]
      operationId: listGroups
      summary: List all observed local and NSS-resolved groups.
      description: >
        Returns all Group objects observed by the E8 users collector.
        Filter by source to narrow to local (/etc/group) or NSS-resolved entries.
      parameters:
        - name: source
          in: query
          schema:
            type: string
            enum: [local, nss, all]
            default: all
        - $ref: '#/components/parameters/QueryLimit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      result:
                        type: array
                        items: { $ref: '#/components/schemas/Group' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /groups/{gid}:
    get:
      tags: [groups]
      operationId: getGroup
      summary: Get a single group by numeric gid.
      description: Returns the Group object for the given numeric gid, or 404 if not found.
      parameters:
        - name: gid
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/Group' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /nfs-idmap:
    get:
      tags: [nfs]
      operationId: getNfsIdmap
      summary: Get the observed NFS idmap daemon configuration (singleton).
      description: >
        Returns the singleton NfsIdmap object reflecting the current rpc.idmapd
        configuration and daemon state. Observed-state segment is `nfs_idmap`;
        public route is `/nfs-idmap` per ADR-0003.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - type: object
                    properties:
                      result: { $ref: '#/components/schemas/NfsIdmap' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [nfs]
      operationId: setNfsIdmap
      summary: Set the NFS idmapd domain (plan/apply).
      description: |
        Two-phase like every mutating operation. `mode=plan` carries the new
        domain — `{ mode: plan, domain }` (or nested as `spec: { domain }`),
        a DNS domain containing a `.` — and returns a `Plan`. NfsIdmap is
        observed-only (no desired row), so the plan's
        `state_revision_expected` is the observed `nfs_idmap/snapshot`
        revision (0 on a fresh install); echo it back as `expected_revision`
        on apply. `mode=apply` requires `plan_id`, `expected_revision`, and
        `idempotency_key`.
      requestBody: { $ref: '#/components/requestBodies/Mutating' }
      responses:
        '200': { $ref: '#/components/responses/PlanReturned' }
        '202': { $ref: '#/components/responses/TaskAccepted' }
        '400': { $ref: '#/components/responses/InvalidArgument' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }
        '500': { $ref: '#/components/responses/Internal' }
