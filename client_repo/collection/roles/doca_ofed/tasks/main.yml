- name: Ensure build dependencies are present
  ansible.builtin.apt:
    name:
      - dkms
      - build-essential
      - linux-headers-{{ ansible_kernel }}
      - libelf-dev
    state: present
  tags: [ofed, deps]

# NVIDIA rotated the DOCA-Host signing key (2026-01 -> 70454E6B…DC726C5E41B9CC50),
# published per component as doca_keyring.gpg (already a binary keyring). The
# legacy base-path GPG-KEY-Mellanox.pub no longer carries it, so the old
# `apt_key url=.../GPG-KEY-Mellanox.pub` produced `NO_PUBKEY DC726C5E41B9CC50` and
# `apt update` failed the entire install. Drop the keyring straight into
# trusted.gpg.d (force: true so a future rotation self-heals) — the path verified
# end-to-end on DOCA hardware. Also clears the deprecated apt_key module.
# (Mirrors the server-side doca_ofed role.)
- name: Install NVIDIA DOCA repository signing key
  ansible.builtin.get_url:
    url: "{{ doca_repo_base }}/{{ doca_repo_component }}/doca_keyring.gpg"
    dest: /etc/apt/trusted.gpg.d/mellanox-doca.gpg
    mode: '0644'
    force: true
  tags: [ofed, repo]

- name: Add DOCA-OFED APT repo
  ansible.builtin.apt_repository:
    repo: "deb {{ doca_repo_base }}/{{ doca_repo_component }} /"
    filename: "mellanox-doca"
    state: present
  register: repo_added
  tags: [ofed, repo]

- name: Update APT cache (if repo added)
  ansible.builtin.apt:
    update_cache: yes
  when: repo_added is changed
  tags: [ofed, repo]

- name: Install DOCA-OFED packages
  ansible.builtin.apt:
    name: "{{ doca_pkgs }}"
    state: present
    update_cache: yes
  register: ofed_pkgs
  notify: restart openibd
  tags: [ofed, install]

- name: Reboot if kernel modules built and reboot requested
  ansible.builtin.reboot:
    msg: "Reboot after DOCA-OFED install (role doca_ofed)"
    reboot_timeout: 1200
  when: ofed_pkgs is changed and doca_ofed_auto_reboot | bool
  tags: [ofed, reboot]
