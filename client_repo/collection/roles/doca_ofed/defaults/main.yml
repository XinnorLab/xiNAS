doca_distro_series: "ubuntu24.04"
doca_version: "latest"         # NVIDIA repo alias to the most recent DOCA-Host release
doca_repo_base: "https://linux.mellanox.com/public/repo/doca"
doca_repo_component: "{{ doca_version }}/{{ doca_distro_series }}/x86_64"

doca_pkgs:
  - doca-all           # DOCA-Host "Everything" profile (drivers, userspace, tools)
  - mlnx-fw-updater    # NIC firmware updater

doca_ofed_auto_reboot: false
